services:
  # coinbot – runs continuously as a worker
  - type: worker
    name: coinbot
    env: docker
    plan: free
    dockerfilePath: ./farming-bot/coinbot/Dockerfile
    dockerContext: ./farming-bot/coinbot
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: airdrop-db
          property: connectionString
      - key: MASTER_WALLET_ADDRESS
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: CONSOLIDATION_ENABLED
        value: "true"
      - key: HEADLESS
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"

  # airfarm – runs on a schedule (cron job)
  - type: cronjob
    name: airfarm
    env: docker
    schedule: "0 */6 * * *"   # every 6 hours
    plan: free
    dockerfilePath: ./farming-bot/airfarm/Dockerfile
    dockerContext: ./farming-bot/airfarm
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: airdrop-db
          property: connectionString
      - key: MASTER_WALLET_ADDRESS
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: CHECK_INTERVAL_HOURS
        value: "6"
      - key: HEADLESS
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: airdrop-db
    plan: free
    databaseName: airdrop_db
    user: airdrop_user
