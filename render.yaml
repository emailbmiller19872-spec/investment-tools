services:
  # coinbot – runs continuously as web service (with health check for 24/7 operation)
  - type: web
    name: coinbot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: airdrop-db
          property: connectionString
      - key: WALLET_ADDRESSES
        value: "0x2FF502B90BebAf136bb45a8ac832FF2d0CDe554C,0xd184f33FAD250c6d9ffFAD376C2475A9F20BC299,0x8dF72d3aE586dBB01806aD64BFBA8be917090a09,0xb4099bF73f40080553d859cD0E3E356aB1709e3C"
      - key: FARM_PRIVATE_KEYS
        value: "84315dc7dec19908a461962c30e46debe18154a11535909bdf9d2aa1d921e0e6,96b6395af06f0d9f725cbbf001cfb26ec49c4a78c6077d3380145123c455ebe8,1539dead355b93fb43eec50075c151be6b0769c53cf8adc4dba0b8110e2809af,a62358d8c373d2422e6cd779f254f71b72185713fcda46258f68650919535d5a"
      - key: MASTER_WALLET_ADDRESS
        value: "0x4962f14DE79c05F44a0B240791b150143B7b15df"
      - key: MASTER_PRIVATE_KEY
        value: "e75533612c12584f2ad399fc2f0eb030aacaab7e5aa2a74b5ff22b0c18df6799"
      - key: ETH_PROVIDER_URLS
        value: "https://mainnet.infura.io/v3/YOUR_INFURA_KEY,https://rpc.ankr.com/eth,https://eth.llamarpc.com"
      - key: CONSOLIDATION_ENABLED
        value: "true"
      - key: HEADLESS
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: BOT_TYPE
        value: "coinbot"
      - key: CLAIM_INTERVAL_HOURS
        value: "1"

  # airfarm – runs on a schedule (cron job)
  - type: cronjob
    name: airfarm
    env: docker
    schedule: "0 */6 * * *"   # every 6 hours
    plan: free
    dockerfilePath: ./farming-bot/airfarm/Dockerfile
    dockerContext: ./farming-bot/airfarm
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: airdrop-db
          property: connectionString
      - key: WALLET_ADDRESSES
        value: "0x4962f14DE79c05F44a0B240791b150143B7b15df"
      - key: MASTER_WALLET_ADDRESS
        value: "0x4962f14DE79c05F44a0B240791b150143B7b15df"
      - key: MASTER_PRIVATE_KEY
        value: "e75533612c12584f2ad399fc2f0eb030aacaab7e5aa2a74b5ff22b0c18df6799"
      - key: RPC_ENDPOINTS
        value: "https://mainnet.infura.io/v3/YOUR_INFURA_KEY,https://rpc.ankr.com/eth,https://eth.llamarpc.com"
      - key: CONSOLIDATION_ENABLED
        value: "true"
      - key: HEADLESS
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: BOT_TYPE
        value: "airfarm"
      - key: CHECK_INTERVAL_HOURS
        value: "6"

databases:
  - name: airdrop-db
    plan: free
    databaseName: airdrop_db
    user: airdrop_user
