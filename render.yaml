services:
  - type: worker
    name: coinbot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: HEADLESS
        value: "true"
      - key: BOT_TYPE
        value: "coinbot"
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: worker
    name: airfarm
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: HEADLESS
        value: "true"
      - key: BOT_TYPE
        value: "airfarm"
      - key: PYTHONUNBUFFERED
        value: "1"
