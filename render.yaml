services:
  - type: web
    name: coinbot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: HEADLESS
        value: "true"
      - key: BOT_TYPE
        value: "coinbot"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "8000"

  - type: web
    name: airfarm
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: HEADLESS
        value: "true"
      - key: BOT_TYPE
        value: "airfarm"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "8000"
