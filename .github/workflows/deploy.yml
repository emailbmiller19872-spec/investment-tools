name: Deploy Bots to OCI

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push bot images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/coinbot:latest
            ${{ secrets.DOCKER_USERNAME }}/airfarm:latest

      - name: Deploy to Oracle Cloud VM
        uses: appleboy/ssh-action@v1.7.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p /home/ubuntu/bot-deploy
            cat > /home/ubuntu/bot-deploy/.env <<'EOF'
            ${{ secrets.BOT_ENV }}
            EOF
            cat > /home/ubuntu/bot-deploy/docker-compose.yml <<'EOF'
            version: '3.8'

            services:
              coinbot:
                image: ${{ secrets.DOCKER_USERNAME }}/coinbot:latest
                container_name: coinbot
                restart: unless-stopped
                env_file:
                  - .env
                environment:
                  - BOT_TYPE=coinbot
                volumes:
                  - ./data:/app/data
                  - ./logs:/app/logs
                healthcheck:
                  test: ["CMD-SHELL", "python -c 'import requests; requests.get(\"http://localhost:8080/health\")' || exit 1'"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 60s

              airfarm:
                image: ${{ secrets.DOCKER_USERNAME }}/airfarm:latest
                container_name: airfarm
                restart: unless-stopped
                env_file:
                  - .env
                environment:
                  - BOT_TYPE=airfarm
                volumes:
                  - ./data:/app/data
                  - ./logs:/app/logs
                depends_on:
                  coinbot:
                    condition: service_healthy
            EOF

            cd /home/ubuntu/bot-deploy
            mkdir -p data logs
            docker pull ${{ secrets.DOCKER_USERNAME }}/coinbot:latest || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/airfarm:latest || true
            docker compose up -d
