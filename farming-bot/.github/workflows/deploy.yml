name: Deploy Farming Bot to Oracle Cloud

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push coinbot
        uses: docker/build-push-action@v5
        with:
          context: ./coinbot
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/coinbot:latest

      - name: Build and push airfarm
        uses: docker/build-push-action@v5
        with:
          context: ./airfarm
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/airfarm:latest

      - name: Deploy to Oracle Cloud VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          script: |
            cat <<'EOF' > /home/ubuntu/coinbot.env
            ${{ secrets.COINBOT_ENV }}
            EOF
            cat <<'EOF' > /home/ubuntu/airfarm.env
            ${{ secrets.AIRFARM_ENV }}
            EOF
            docker pull ${{ secrets.DOCKER_USERNAME }}/coinbot:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/airfarm:latest
            docker stop coinbot airfarm 2>/dev/null || true
            docker rm coinbot airfarm 2>/dev/null || true
            docker run -d --name coinbot --restart unless-stopped \
              --env-file /home/ubuntu/coinbot.env \
              ${{ secrets.DOCKER_USERNAME }}/coinbot:latest
            docker run -d --name airfarm --restart unless-stopped \
              --env-file /home/ubuntu/airfarm.env \
              ${{ secrets.DOCKER_USERNAME }}/airfarm:latest
